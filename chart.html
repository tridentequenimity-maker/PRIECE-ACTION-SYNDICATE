<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAS LIVE CHART</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
overflow:hidden;
font-family:Arial,sans-serif;
}

/* TOP BAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:55px;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
z-index:9999;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
color:white;
font-size:12px;
font-weight:700;
letter-spacing:2px;
}

.logo span{
color:#dc2626;
}

.symbol-box{
display:flex;
align-items:center;
gap:10px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#22c55e;
box-shadow:0 0 10px #22c55e;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
opacity:1;
transform:scale(1);
}

50%{
opacity:0.4;
transform:scale(0.8);
}

100%{
opacity:1;
transform:scale(1);
}

}

.symbol{
color:white;
font-size:12px;
font-weight:600;
letter-spacing:1px;
}

/* CHART */

#tradingview_chart{
width:100vw;
height:100vh;
padding-top:55px;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">
PRICE ACTION SYNDICATE<span>.</span>
</div>

<div class="symbol-box">

<div class="dot"></div>

<div class="symbol" id="symbol-name">
XAUUSD
</div>

</div>

</div>

<!-- CHART -->

<div id="tradingview_chart"></div>

<!-- TRADINGVIEW -->

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* GET SYMBOL FROM URL */

const params = new URLSearchParams(window.location.search);

let symbol = params.get("symbol") || "XAUUSD";

/* DISPLAY NAME */

document.getElementById("symbol-name").innerHTML = symbol;

/* CONVERT SYMBOL */

let tvSymbol = "";

/* FOREX */

if(
symbol === "XAUUSD" ||
symbol === "XAGUSD" ||
symbol === "EURUSD" ||
symbol === "GBPUSD" ||
symbol === "USDJPY" ||
symbol === "AUDUSD" ||
symbol === "NZDUSD" ||
symbol === "USDCAD" ||
symbol === "USDCHF" ||
symbol === "EURJPY" ||
symbol === "GBPJPY" ||
symbol === "EURGBP"
){

tvSymbol = "OANDA:" + symbol;

}

/* CRYPTO */

else{

tvSymbol = "BINANCE:" + symbol;

}

/* LOAD CHART */

new TradingView.widget({

"container_id": "tradingview_chart",

"width": "100%",
"height": "100%",

"symbol": tvSymbol,

"interval": "15",

"timezone": "Asia/Jakarta",

"theme": "dark",

"style": "1",

"locale": "en",

"toolbar_bg": "#050505",

"enable_publishing": false,

"hide_side_toolbar": false,

"allow_symbol_change": true,

"withdateranges": true,

"save_image": false,

"studies": [
"RSI@tv-basicstudies",
"MACD@tv-basicstudies"
]

});

</script>

</body>
  </html>
